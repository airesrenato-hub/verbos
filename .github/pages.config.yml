# GitHub Pages configuration
# This file configures GitHub Pages deployment

# Source branch and directory
source:
  branch: main
  path: /

# Build settings
build:
  command: echo "No build required - static HTML files"
  
# Deployment settings
deploy:
  target: github-pages
  
# Custom domain (optional)
# domain: your-custom-domain.com

# HTTPS enforcement
https: true

# Clean URL (remove .html extensions)
clean_urls: false
