<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Test Page</h1>
    <p>If you see this, HTML is working.</p>
    
    <button onclick="alert('JavaScript is working!')">Test JavaScript</button>
    
    <div id="test"></div>
    
    <script>
        document.getElementById('test').innerHTML = '<p style="color: green;">JavaScript loaded successfully!</p>';
    </script>
</body>
</html>
